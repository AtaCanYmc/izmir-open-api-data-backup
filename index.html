<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESHOT Hat Veri Gosterici</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="mb-6 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
        <h1 class="text-2xl font-bold tracking-tight">Izmir ESHOT Hatlari</h1>
        <p class="mt-2 text-sm text-slate-600">
          Kaynak: <code>data/eshot-hatlar.json</code>
        </p>

        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <label class="block">
            <span class="mb-1 block text-sm font-medium text-slate-700">Hat no ara</span>
            <input
              id="searchInput"
              type="text"
              placeholder="Orn: 121"
              class="w-full rounded-xl border border-slate-300 px-3 py-2 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
            />
          </label>
          <div class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
            <p class="text-xs uppercase tracking-wide text-slate-500">Guncelleme</p>
            <p id="updatedAt" class="mt-1 text-sm font-medium text-slate-700">Yukleniyor...</p>
          </div>
        </div>
      </section>

      <section class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200">
        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
          <h2 class="text-base font-semibold">Hat Listesi</h2>
          <span id="resultCount" class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">0 kayit</span>
        </div>

        <div id="status" class="px-4 py-6 text-sm text-slate-500">Veri yukleniyor...</div>

        <div id="tableWrap" class="hidden overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50 text-left text-slate-600">
              <tr>
                <th class="px-4 py-3 font-semibold">Hat No</th>
                <th class="px-4 py-3 font-semibold">Hat Adi</th>
                <th class="px-4 py-3 font-semibold">Baslangic</th>
                <th class="px-4 py-3 font-semibold">Bitis</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const state = {
        rows: [],
      };

      const searchInput = document.getElementById("searchInput");
      const statusEl = document.getElementById("status");
      const tableWrap = document.getElementById("tableWrap");
      const tableBody = document.getElementById("tableBody");
      const resultCount = document.getElementById("resultCount");
      const updatedAt = document.getElementById("updatedAt");

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("tr-TR", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(date);
      }

      function normalize(value) {
        return String(value || "").toLowerCase();
      }

      function renderRows(rows) {
        resultCount.textContent = `${rows.length} kayit`;

        if (!rows.length) {
          tableWrap.classList.add("hidden");
          statusEl.classList.remove("hidden");
          statusEl.textContent = "Sonuc bulunamadi.";
          return;
        }

        statusEl.classList.add("hidden");
        tableWrap.classList.remove("hidden");

        tableBody.innerHTML = rows
          .map(
            (item) => `
              <tr class="hover:bg-slate-50">
                <td class="whitespace-nowrap px-4 py-3 font-medium text-slate-900">${item.HAT_NO || "-"}</td>
                <td class="px-4 py-3 text-slate-700">${item.HAT_ADI || "-"}</td>
                <td class="px-4 py-3 text-slate-600">${item.HAT_BASLANGIC || "-"}</td>
                <td class="px-4 py-3 text-slate-600">${item.HAT_BITIS || "-"}</td>
              </tr>
            `
          )
          .join("");
      }

      function applyFilter() {
        const query = normalize(searchInput.value.trim());
        const filtered = state.rows.filter((item) => normalize(item.HAT_NO).includes(query));
        renderRows(filtered);
      }

      async function load() {
        try {
          const response = await fetch("data/eshot-hatlar.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          state.rows = Array.isArray(payload.hatlar) ? payload.hatlar : [];
          updatedAt.textContent = formatDate(payload.updatedAt);
          renderRows(state.rows);
        } catch (error) {
          statusEl.classList.remove("hidden");
          tableWrap.classList.add("hidden");
          statusEl.textContent = `Veri okunamadi: ${error.message}`;
          updatedAt.textContent = "-";
        }
      }

      searchInput.addEventListener("input", applyFilter);
      load();
    </script>
  </body>
</html>
