name: Monthly ESHOT Backup to Supabase

on:
  schedule:
    # Her ayın 15'i saat 18:00 UTC (Türkiye saati 21:00)
    - cron: '0 18 15 * *'
  workflow_dispatch: # Manuel tetikleme için

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backup to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run backup

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Yedekleme başarısız oldu!"
          echo "Lütfen Supabase bağlantı ayarlarını ve API'yi kontrol edin."
