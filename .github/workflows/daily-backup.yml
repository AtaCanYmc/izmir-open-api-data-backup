name: Daily ESHOT Backup

on:
  schedule:
    # TSİ 23:00 = UTC 20:00
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backup script
        run: npm run backup

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/eshot-hatlar.json data/eshot; then
            echo "Degisiklik yok, commit atlanacak."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/eshot-hatlar.json data/eshot
          git commit -m "chore: daily eshot backup $(date -u +'%Y-%m-%d')"
          git push

